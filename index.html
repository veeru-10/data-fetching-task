<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Food App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body id="body">
  <nav class="navbar navbar-light navbar-expand-lg nav-bar sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="./logo.png" alt="logo" width="40x">
        <span class="logo">Foodie Fix</span>
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon text-dark"></span>
      </button>
      <div class="collapse navbar-collapse d-lg-flex align-items-lg-center w-100" id="navbarSupportedContent">
        <div class="d-lg-flex justify-content-lg-evenly align-items-lg-center w-100">
          <select class="collapse-dropdown w-100 my-3 me-lg-2" id="foodItemsDropdown">
            <option value="all">all</option>
            <option value="pasta">pasta</option>
            <option value="drink">drinks</option>
            <option value="dessert">dessert</option>
            <option value="sandwich">sandwich</option>
            <option value="wrap">wrap</option>
            <option value="snacks">snacks</option>
            <option value="mexican">mexican</option>
            <option value="chinese">chinese</option>
          </select>
          <select class="collapse-dropdown w-100 my-3 mx-lg-2 py-2" id="foodPriceDropdown">
            <option value="all">all</option>
            <option value="0-100">0-100</option>
            <option value="100-200">100-200</option>
            <option value="200-300">200-300</option>
            <option value="300-400">300-400</option>
          </select>
          <form class="d-flex my-3 ms-lg-2 flex-grow-1" role="search" id="searchForm">
            <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search" id="searchInput"/>
            <button class="btn btn-outline-dark" type="submit">Search</button>
          </form>
        </div>
      </div>
    </div>
  </nav>
  <div class="d-flex justify-content-center align-items-center flex-wrap gap-2 m-2 p-2" id="summerUi"></div>
  <div class="d-flex justify-content-center align-items-center flex-wrap gap-2 m-2 p-2 position-relative" id="container">
  </div>
  <div class="toggle-one" id="mode-switch">
    <img src="./night-mode.png" alt="light mode" class="mode-img" id="mode-switch-img">
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  <script src="./foods.js"></script>
</body>
</html>
